<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronómetro Zen Completo</title>
    <style>
        :root {
            --dark-border: #2b2b2b;
            
            /* Colores de botones mate y relajantes */
            --btn-start-pastel: #a3cfbb; 
            --btn-clear-pastel: #e6a1a1; 
            --btn-edit-pastel: #e2e3e5;  
            --btn-hover-darken: rgba(0, 0, 0, 0.05);

            /* Fondos pastel muy sutiles por pestaña */
            --bg-mediacion: #f3f7f5; 
            --bg-monologo: #f5f2f9;  
            --bg-dialogo: #f2f5f8;   
            --bg-trialogo: #fdf8f2;  /* Tono arena/crema muy suave */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #111111;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background-color 0.4s ease;
        }

        /* Tabs superiores */
        .tabs {
            display: flex;
            background: #ffffff;
            border-bottom: 1px solid #e5e5e5;
            z-index: 5;
        }

        .tab-btn {
            padding: 22px 10px;
            border: none;
            background: none;
            color: #88888d;
            font-size: 19px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 3px solid transparent;
            text-align: center;
        }

        /* Pestañas normales: se expanden con un peso de 10 */
        .tab-btn-main {
            flex: 10;
        }

        /* Pestaña Triálogo: un 60% más pequeña (peso de 4) */
        .tab-btn-small {
            flex: 4;
            font-size: 16px; /* Ligeramente menor para encajar su tamaño reducido */
            opacity: 0.8;
        }

        .tab-btn.active {
            color: #111111;
            border-bottom: 3px solid #111111;
            font-weight: 700;
            opacity: 1;
        }

        /* Contenedor principal */
        .main-content {
            flex: 1;
            display: flex;
            position: relative;
        }

        .tab-content {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: space-between;
            padding: 1vh 20px 4vh 20px;
        }

        .tab-content.active {
            display: flex;
        }

        #tab-0 { background-color: var(--bg-mediacion); }
        #tab-1 { background-color: var(--bg-monologo); }
        #tab-2 { background-color: var(--bg-dialogo); }
        #tab-3 { background-color: var(--bg-trialogo); }

        /* NÚMEROS MÁXIMOS */
        .timer-display {
            font-size: 42vh; 
            font-weight: 700;
            font-variant-numeric: tabular-nums; 
            color: #111111;
            line-height: 0.85;
            text-align: center;
            margin-top: auto;
            margin-bottom: auto;
            letter-spacing: -0.03em;
            user-select: none;
        }

        /* Botones de acciones inferiores */
        .actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }

        .btn {
            flex: 1;
            padding: 24px;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            border: 3px solid var(--dark-border);
            border-radius: 18px;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
            box-shadow: 0 5px 0px var(--dark-border);
        }

        .btn:active { 
            transform: translateY(5px);
            box-shadow: 0 0px 0px var(--dark-border);
        }

        .btn-start { background-color: var(--btn-start-pastel); color: #1c3d2e; }
        .btn-clear { background-color: var(--btn-clear-pastel); color: #5a2c2c; }
        .btn-edit { background-color: var(--btn-edit-pastel); color: #333333; }

        .btn:hover { filter: brightness(0.94); }

        /* Teclado de edición */
        .keypad-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            z-index: 10;
        }

        .keypad-overlay.open { display: flex; }

        .keypad-screen {
            font-size: 32px;
            font-weight: bold;
            background: #222222;
            color: #a3cfbb;
            padding: 15px 60px;
            border: 3px solid var(--dark-border);
            border-radius: 14px;
            margin-bottom: 30px;
            font-family: monospace;
            text-align: center;
            box-shadow: 0 4px 0px var(--dark-border);
        }

        .keypad-grid {
            display: grid;
            grid-template-columns: repeat(3, 105px);
            grid-template-rows: repeat(4, 85px);
            gap: 15px;
        }

        .key-btn {
            background-color: var(--btn-edit-pastel);
            color: #111111;
            font-size: 36px;
            font-weight: bold;
            border: 3px solid var(--dark-border);
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 0px var(--dark-border);
        }

        .key-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0px var(--dark-border);
        }

        .key-btn.set-key { background-color: var(--btn-start-pastel); font-size: 22px; color: #1c3d2e; }
        .key-btn.clear-key { font-size: 20px; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn tab-btn-main active" onclick="switchTab(0)">Mediación</button>
        <button class="tab-btn tab-btn-main" onclick="switchTab(1)">Monólogo</button>
        <button class="tab-btn tab-btn-main" onclick="switchTab(2)">Diálogo</button>
        <button class="tab-btn tab-btn-small" onclick="switchTab(3)">Triálogo</button>
    </div>

    <div class="main-content">
        
        <div id="tab-0" class="tab-content active">
            <div class="timer-display" id="display-0">02:00</div>
            <div class="actions">
                <button class="btn btn-start" id="start-0" onclick="toggleTimer(0)">Start</button>
                <button class="btn btn-clear" onclick="clearTimer(0)">Reset</button>
                <button class="btn btn-edit" onclick="toggleKeypad(0)">Edit</button>
            </div>
            <div class="keypad-overlay" id="keypad-0">
                <div class="keypad-screen" id="key-screen-0">Mins: 00 | Segs: 00</div>
                <div class="keypad-grid">
                    <button class="key-btn" onclick="pressNum(0, 1)">1</button>
                    <button class="key-btn" onclick="pressNum(0, 2)">2</button>
                    <button class="key-btn" onclick="pressNum(0, 3)">3</button>
                    <button class="key-btn" onclick="pressNum(0, 4)">4</button>
                    <button class="key-btn" onclick="pressNum(0, 5)">5</button>
                    <button class="key-btn" onclick="pressNum(0, 6)">6</button>
                    <button class="key-btn" onclick="pressNum(0, 7)">7</button>
                    <button class="key-btn" onclick="pressNum(0, 8)">8</button>
                    <button class="key-btn" onclick="pressNum(0, 9)">9</button>
                    <button class="key-btn clear-key" onclick="clearKeypad(0)">Clear</button>
                    <button class="key-btn" onclick="pressNum(0, 0)">0</button>
                    <button class="key-btn set-key" onclick="setTimer(0)">Set</button>
                </div>
            </div>
        </div>

        <div id="tab-1" class="tab-content">
            <div class="timer-display" id="display-1">03:30</div>
            <div class="actions">
                <button class="btn btn-start" id="start-1" onclick="toggleTimer(1)">Start</button>
                <button class="btn btn-clear" onclick="clearTimer(1)">Reset</button>
                <button class="btn btn-edit" onclick="toggleKeypad(1)">Edit</button>
            </div>
            <div class="keypad-overlay" id="keypad-1">
                <div class="keypad-screen" id="key-screen-1">Mins: 00 | Segs: 00</div>
                <div class="keypad-grid">
                    <button class="key-btn" onclick="pressNum(1, 1)">1</button>
                    <button class="key-btn" onclick="pressNum(1, 2)">2</button>
                    <button class="key-btn" onclick="pressNum(1, 3)">3</button>
                    <button class="key-btn" onclick="pressNum(1, 4)">4</button>
                    <button class="key-btn" onclick="pressNum(1, 5)">5</button>
                    <button class="key-btn" onclick="pressNum(1, 6)">6</button>
                    <button class="key-btn" onclick="pressNum(1, 7)">7</button>
                    <button class="key-btn" onclick="pressNum(1, 8)">8</button>
                    <button class="key-btn" onclick="pressNum(1, 9)">9</button>
                    <button class="key-btn clear-key" onclick="clearKeypad(1)">Clear</button>
                    <button class="key-btn" onclick="pressNum(1, 0)">0</button>
                    <button class="key-btn set-key" onclick="setTimer(1)">Set</button>
                </div>
            </div>
        </div>

        <div id="tab-2" class="tab-content">
            <div class="timer-display" id="display-2">04:30</div>
            <div class="actions">
                <button class="btn btn-start" id="start-2" onclick="toggleTimer(2)">Start</button>
                <button class="btn btn-clear" onclick="clearTimer(2)">Reset</button>
                <button class="btn btn-edit" onclick="toggleKeypad(2)">Edit</button>
            </div>
            <div class="keypad-overlay" id="keypad-2">
                <div class="keypad-screen" id="key-screen-2">Mins: 00 | Segs: 00</div>
                <div class="keypad-grid">
                    <button class="key-btn" onclick="pressNum(2, 1)">1</button>
                    <button class="key-btn" onclick="pressNum(2, 2)">2</button>
                    <button class="key-btn" onclick="pressNum(2, 3)">3</button>
                    <button class="key-btn" onclick="pressNum(2, 4)">4</button>
                    <button class="key-btn" onclick="pressNum(2, 5)">5</button>
                    <button class="key-btn" onclick="pressNum(2, 6)">6</button>
                    <button class="key-btn" onclick="pressNum(2, 7)">7</button>
                    <button class="key-btn" onclick="pressNum(2, 8)">8</button>
                    <button class="key-btn" onclick="pressNum(2, 9)">9</button>
                    <button class="key-btn clear-key" onclick="clearKeypad(2)">Clear</button>
                    <button class="key-btn" onclick="pressNum(2, 0)">0</button>
                    <button class="key-btn set-key" onclick="setTimer(2)">Set</button>
                </div>
            </div>
        </div>

        <div id="tab-3" class="tab-content">
            <div class="timer-display" id="display-3">06:30</div>
            <div class="actions">
                <button class="btn btn-start" id="start-3" onclick="toggleTimer(3)">Start</button>
                <button class="btn btn-clear" onclick="clearTimer(3)">Reset</button>
                <button class="btn btn-edit" onclick="toggleKeypad(3)">Edit</button>
            </div>
            <div class="keypad-overlay" id="keypad-3">
                <div class="keypad-screen" id="key-screen-3">Mins: 00 | Segs: 00</div>
                <div class="keypad-grid">
                    <button class="key-btn" onclick="pressNum(3, 1)">1</button>
                    <button class="key-btn" onclick="pressNum(3, 2)">2</button>
                    <button class="key-btn" onclick="pressNum(3, 3)">3</button>
                    <button class="key-btn" onclick="pressNum(3, 4)">4</button>
                    <button class="key-btn" onclick="pressNum(3, 5)">5</button>
                    <button class="key-btn" onclick="pressNum(3, 6)">6</button>
                    <button class="key-btn" onclick="pressNum(3, 7)">7</button>
                    <button class="key-btn" onclick="pressNum(3, 8)">8</button>
                    <button class="key-btn" onclick="pressNum(3, 9)">9</button>
                    <button class="key-btn clear-key" onclick="clearKeypad(3)">Clear</button>
                    <button class="key-btn" onclick="pressNum(3, 0)">0</button>
                    <button class="key-btn set-key" onclick="setTimer(3)">Set</button>
                </div>
            </div>
        </div>

    </div>

<script>
    // Configuración de tiempos base incluyendo la nueva pestaña (en segundos)
    const defaultTimes = [120, 210, 270, 390]; 
    let currentTimes = [...defaultTimes]; 
    let timeRemaining = [...defaultTimes]; 
    let intervals = [null, null, null, null];
    let keypadInputs = ["", "", "", ""]; 

    function switchTab(tabIndex) {
        document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
            btn.classList.toggle('active', idx === tabIndex);
        });
        document.querySelectorAll('.tab-content').forEach((content, idx) => {
            content.classList.toggle('active', idx === tabIndex);
        });
    }

    function updateDisplay(tabIndex, totalSeconds) {
        const mins = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
        const secs = (totalSeconds % 60).toString().padStart(2, '0');
        document.getElementById(`display-${tabIndex}`).innerText = `${mins}:${secs}`;
    }

    function toggleTimer(tabIndex) {
        const startBtn = document.getElementById(`start-${tabIndex}`);
        
        if (intervals[tabIndex]) {
            clearInterval(intervals[tabIndex]);
            intervals[tabIndex] = null;
            startBtn.innerText = "Start";
            startBtn.style.backgroundColor = "var(--btn-start-pastel)";
        } else {
            if (timeRemaining[tabIndex] <= 0) return;
            
            startBtn.innerText = "Pause";
            startBtn.style.backgroundColor = "#ffebad"; 
            
            intervals[tabIndex] = setInterval(() => {
                timeRemaining[tabIndex]--;
                updateDisplay(tabIndex, timeRemaining[tabIndex]);
                
                if (timeRemaining[tabIndex] <= 0) {
                    clearInterval(intervals[tabIndex]);
                    intervals[tabIndex] = null;
                    startBtn.innerText = "Start";
                    startBtn.style.backgroundColor = "var(--btn-start-pastel)";
                    
                    playZenHarpArpeggio(); 
                    autoResetTimer(tabIndex); 
                }
            }, 1000);
        }
    }

    function clearTimer(tabIndex) {
        clearInterval(intervals[tabIndex]);
        intervals[tabIndex] = null;
        timeRemaining[tabIndex] = currentTimes[tabIndex];
        updateDisplay(tabIndex, timeRemaining[tabIndex]);
        
        const startBtn = document.getElementById(`start-${tabIndex}`);
        startBtn.innerText = "Start";
        startBtn.style.backgroundColor = "var(--btn-start-pastel)";
    }

    function autoResetTimer(tabIndex) {
        timeRemaining[tabIndex] = currentTimes[tabIndex];
        updateDisplay(tabIndex, timeRemaining[tabIndex]);
    }

    function toggleKeypad(tabIndex) {
        const keypad = document.getElementById(`keypad-${tabIndex}`);
        keypad.classList.toggle('open');
        clearKeypad(tabIndex);
    }

    function pressNum(tabIndex, num) {
        if (keypadInputs[tabIndex].length >= 4) return; 
        keypadInputs[tabIndex] += num;
        renderKeypadScreen(tabIndex);
    }

    // Limpia la pantalla de edición del panel de configuración
    function clearKeypad(tabIndex) {
        keypadInputs[tabIndex] = "";
        renderKeypadScreen(tabIndex);
    }

    function renderKeypadScreen(tabIndex) {
        const digits = keypadInputs[tabIndex].padStart(4, '0');
        const mins = digits.substring(0, 2);
        const secs = digits.substring(2, 4);
        document.getElementById(`key-screen-${tabIndex}`).innerText = `Mins: ${mins} | Segs: ${secs}`;
    }

    function setTimer(tabIndex) {
        const digits = keypadInputs[tabIndex].padStart(4, '0');
        const mins = parseInt(digits.substring(0, 2), 10);
        const secs = parseInt(digits.substring(2, 4), 10);
        
        if (secs >= 60) {
            alert("Los segundos deben ser de 00 a 59");
            return;
        }

        const totalSeconds = (mins * 60) + secs;
        if (totalSeconds <= 0) return;

        currentTimes[tabIndex] = totalSeconds;
        clearTimer(tabIndex); 
        toggleKeypad(tabIndex); 
    }

    // Arpegio de arpa largo de 14 notas (Web Audio API)
    function playZenHarpArpeggio() {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        
        const notasHarp = [
            130.81, 164.81, 196.00, 261.63, 329.63, 392.00, 523.25, 
            659.25, 523.25, 392.00, 329.63, 261.63, 196.00, 164.81
        ]; 
        
        const tempoLento = 280; 
        const resonanciaSustendida = 6.0; 

        notasHarp.forEach((freq, index) => {
            setTimeout(() => {
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                
                osc.type = 'sine'; 
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                
                gainNode.gain.setValueAtTime(0.001, ctx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.18, ctx.currentTime + 0.05); 
                gainNode.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + resonanciaSustendida); 
                
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                
                osc.start();
                osc.stop(ctx.currentTime + resonanciaSustendida);
            }, index * tempoLento);
        });
    }
</script>

</body>
</html>
